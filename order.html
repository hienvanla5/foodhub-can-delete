<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Place Order</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/order.css" />
    <link rel="stylesheet" href="css/toast.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="logo">Food<span class="accent">Hub</span></h1>
        <nav class="nav">
          <a class="nav-link" href="index.html">Home</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="order-wrap">
        <div class="order-left">
          <div class="selected-food card" id="selectedFoodCard">
            <!-- populated by JS -->
          </div>

          <form id="orderForm" class="order-form" novalidate>
            <h3>Delivery details</h3>

            <label
              >Full name
              <input
                type="text"
                name="fullname"
                id="fullname"
                placeholder="Your full name"
                required
              />
            </label>

            <label
              >Phone number
              <input
                type="tel"
                name="phone"
                id="phone"
                placeholder="0123456789"
                required
              />
            </label>

            <label
              >Delivery address
              <input
                type="text"
                name="address"
                id="address"
                placeholder="Street, City"
                required
              />
            </label>

            <label
              >Quantity
              <input
                type="number"
                name="quantity"
                id="quantity"
                value="1"
                min="1"
                required
              />
            </label>

            <fieldset class="payment">
              <legend>Payment method</legend>
              <label
                ><input type="radio" name="payment" value="cash" checked />
                Cash</label
              >
              <label
                ><input type="radio" name="payment" value="momo" /> Momo</label
              >
              <label
                ><input type="radio" name="payment" value="banking" />
                Banking</label
              >
            </fieldset>

            <label
              >Note (optional)
              <textarea
                name="note"
                id="note"
                rows="3"
                placeholder="Any instructions..."
              ></textarea>
            </label>

            <div class="form-actions">
              <button type="submit" class="btn">Place order</button>
              <a class="btn secondary" href="index.html">Cancel</a>
            </div>
          </form>
        </div>

        <aside class="order-right card">
          <h3>Order summary</h3>
          <div id="summaryContent">
            <!-- populated by JS -->
          </div>
        </aside>
      </section>
    </main>

    <script type="module" src="js/order.js"></script>
  </body>
</html>
