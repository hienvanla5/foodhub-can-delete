<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Food Order — Home</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/toast.css" />
  </head>
  
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="logo">Food<span class="accent">Hub</span></h1>
        <nav class="nav">
          <a class="nav-link active" href="index.html">Home</a>
          <a class="nav-link" href="login.html">Login
          </a>

          <a class="nav-link" href="register.html">Register
          </a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h2>Delicious food delivered fast</h2>
        <p class="lead">
          Choose from our tasty selection and place your order.
        </p>
      </section>

      <section
        class="foods-grid"
        id="foodsContainer"
        aria-live="polite"
      ></section>
    </main>

    <script type="module" src="js/home.js"></script>
    <div id="toast" class="toast">
      Truy cập thành công!
    </div>
    <script>

      const isLoggedIn =
      localStorage.getItem("loginSuccess");

      if(isLoggedIn === "true"){

          const toast =
          document.getElementById("toast");

          toast.classList.add("show");

          setTimeout(() => {

              toast.classList.remove("show");

              localStorage.removeItem("loginSuccess");

          },3000);
      }

    </script>
  </body>
</html>
